<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michael Mmasi | Portfolio (Technical Blueprint)</title>

<style>
/* RESET */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

body {
  background: black url("engineering.jpg") no-repeat center center fixed;
  background-size: cover;
  color: #c9fafc;
  min-height: 100vh;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1;
}

/* MAIN LAYOUT GRID */
.container {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-areas: 
    "header header header"
    "about profile skills"
    "contact contact contact";
  grid-template-columns: 1fr auto 1fr;
  gap: 25px;
  padding: 40px;
  align-items: center;
  justify-items: center;
  max-width: 1000px;
  margin: 0 auto;
}

/* =========================================
   📱 MOBILE OPTIMIZATION (STACKING LAYOUT)
   ========================================= */
@media (max-width: 768px) {
  .container {
    grid-template-areas: 
      "header"
      "profile"
      "about"
      "skills"
      "contact";
    grid-template-columns: 1fr;
    padding: 20px;
    gap: 15px;
  }
  .profile-pic { width: 160px !important; height: 160px !important; margin: 10px 0; }
  .card { width: 100% !important; }
}

/* PROFILE IMAGE */
.profile-pic {
  grid-area: profile;
  width: 250px;
  height: 250px;
  border-radius: 50%;
  border: 5px solid #00f5ff;
  object-fit: cover;
  box-shadow: 0 0 40px rgba(0, 245, 255, 0.7);
}

/* HEADER */
.hud-header { grid-area: header; text-align: center; }
h1 { font-size: 35px; color: #00f5ff; text-shadow: 0 0 12px #00f5ff; }

/* CARDS */
.card {
  background: rgba(0, 128, 128, 0.3);
  padding: 25px;
  border-radius: 12px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0, 245, 255, 0.2);
  width: 100%;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
  background: rgba(0, 128, 128, 0.5);
  box-shadow: 0 0 25px rgba(0, 245, 255, 0.8);
  border-color: rgba(0, 245, 255, 1);
}

.about-card { grid-area: about; }
.skills-card { grid-area: skills; }
.contact-card { grid-area: contact; width: 60%; text-align: center; }

/* BUTTONS */
.button-row { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
.btn {
  padding: 10px 20px;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  border: 1px solid rgba(0, 245, 255, 0.2);
  background: rgba(0, 128, 128, 0.3);
  color: #c9fafc;
}

.whatsapp:hover { background: #25D366; color: black; box-shadow: 0 0 15px #25D366; }
.email:hover { background: #7C4DFF; color: white; box-shadow: 0 0 15px #7C4DFF; }

</style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
  
  <div class="hud-header">
    <h1>Michael Mmasi</h1>
  </div>

  <div class="card about-card">
    <h2>ABOUT</h2>
    <p>Computer Engineering student passionate about building websites, mobile apps, and engineering design.</p>
  </div>

  <img src="myphoto.jpg" class="profile-pic" alt="Michael Mmasi">

  <div class="card skills-card">
    <h2>SKILLS </h2>
    <p>• Web Development <br>• C / C++<br>• CAD Design</p>
  </div>

  <div class="card contact-card">
    <h2>CONTACTS</h2>
    <p style="margin:10px 0;">0682 965 404 | michaelmmasy03@gmail.com</p>
    <div class="button-row">
      <a href="https://wa.me/255682965404" class="btn whatsapp" target="_blank">WhatsApp</a>
      <a href="mailto:michaelmmasy03@gmail.com" class="btn email">Email Me</a>
    </div>
  </div>

</div>

</body>
</html>
