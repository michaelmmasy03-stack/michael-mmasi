<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Michael Mmasi | Adaptive HUD</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL FIX (NO ZOOM / NO SCALING ISSUES)
========================= */
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  background: black url("engineering.jpg") no-repeat center center fixed;
  background-size: cover;
  color: #c9fafc;
}

/* DARK OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.78);
  z-index: 1;
}

/* =========================
   HUD LINE LAYER
========================= */
.lines {
  position: fixed;
  inset: 0;
  z-index: 2;
  overflow: hidden;
}

/* LINE STYLE */
.line {
  position: absolute;
  opacity: 0.5;
  box-shadow: 0 0 8px currentColor;
  will-change: transform;
}

/* VERTICAL */
@keyframes verticalMove {
  0% { transform: translateY(-20vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(120vh); opacity: 0; }
}

/* HORIZONTAL */
@keyframes horizontalMove {
  0% { transform: translateX(-30vw); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateX(130vw); opacity: 0; }
}

/* =========================
   UI CONTAINER (RESPONSIVE SAFE)
========================= */
.container {
  position: relative;
  z-index: 3;
  height: 100%;
  display: grid;
  grid-template-areas:
    "header"
    "profile"
    "about"
    "skills"
    "contact";
  justify-items: center;
  align-content: center;
  gap: 15px;
  padding: 20px;
  text-align: center;
}

h1 {
  font-size: clamp(22px, 4vw, 38px);
  color: #00ffe5;
  text-shadow: 0 0 12px #00ffe5;
}

.profile-pic {
  width: clamp(120px, 25vw, 220px);
  height: clamp(120px, 25vw, 220px);
  border-radius: 50%;
  border: 3px solid #00ffe5;
  box-shadow: 0 0 20px #00ffe5;
  object-fit: cover;
}

/* CARDS */
.card {
  width: 90%;
  max-width: 500px;
  background: rgba(0,128,128,0.25);
  padding: 15px;
  border-radius: 10px;
  border: 1px solid rgba(0,255,229,0.3);
  backdrop-filter: blur(8px);
}

/* BUTTONS */
.btn {
  display: inline-block;
  padding: 8px 14px;
  margin: 5px;
  border: 1px solid #00ffe5;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-size: 14px;
}

.btn:hover {
  background: #00ffe5;
  color: black;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 768px) {
  .card {
    width: 95%;
  }
}

</style>
</head>

<body>

<div class="overlay"></div>
<div class="lines" id="lines"></div>

<script>

/* =========================
   DEVICE DETECTION (KEY UPGRADE)
========================= */
const isMobile = window.innerWidth < 768;

/* AUTO ADAPT LINE COUNT */
const totalLines = isMobile ? 60 : 200;

/* COLORS */
const colors = ["#00ffe5", "#7C4DFF", "#25D366", "#ff2df7"];

const container = document.getElementById("lines");

/* =========================
   GENERATE LINES SMARTLY
========================= */
for (let i = 0; i < totalLines; i++) {

  const line = document.createElement("div");
  line.classList.add("line");

  const speed = Math.random() * 5 + 3;
  const color = colors[Math.floor(Math.random() * colors.length)];

  line.style.background = color;
  line.style.color = color;

  /* SPLIT: VERTICAL + HORIZONTAL */
  const type = i % 2;

  if (type === 0) {
    // VERTICAL
    line.style.width = "2px";
    line.style.height = "120vh";
    line.style.left = Math.random() * 100 + "vw";
    line.style.animation = `verticalMove ${speed}s linear infinite`;
  } else {
    // HORIZONTAL
    line.style.height = "2px";
    line.style.width = "120vw";
    line.style.top = Math.random() * 100 + "vh";
    line.style.animation = `horizontalMove ${speed}s linear infinite`;
  }

  container.appendChild(line);
}

</script>

<!-- UI -->
<div class="container">

  <h1>Michael Mmasi</h1>

  <img src="myphoto.jpg" class="profile-pic">

  <div class="card">
    <h3>ABOUT</h3>
    <p>Computer Engineering student building futuristic systems.</p>
  </div>

  <div class="card">
    <h3>SKILLS</h3>
    <p>Web Dev • C/C++ • CAD • UI Design</p>
  </div>

  <div class="card">
    <h3>CONTACT</h3>
    <p>0682 965 404 | michaelmmasy03@gmail.com</p>

    <a class="btn" href="https://wa.me/255682965404">WhatsApp</a>
    <a class="btn" href="mailto:michaelmmasy03@gmail.com">Email</a>
  </div>

</div>

</body>
</html>
